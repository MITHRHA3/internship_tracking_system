<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internships - Internship Tracking System</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --success: #4cc9f0;
            --warning: #f72585;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --sidebar-width: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fb;
            color: var(--dark);
            display: flex;
            min-height: 100vh;
        }


        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            color: white;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            transition: all 0.3s;
            box-shadow: 3px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .sidebar-menu {
            padding: 15px 0;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .menu-item.active {
            background-color: rgba(255, 255, 255, 0.2);
            border-left: 4px solid var(--success);
        }

        .menu-item i {
            margin-right: 10px;
            font-size: 1.2rem;
        }


        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
            transition: all 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }

        .page-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--gray);
            color: white;
        }


        .table-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        .internship-table {
            width: 100%;
            border-collapse: collapse;
        }

        .internship-table th,
        .internship-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .internship-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: var(--dark);
        }

        .internship-table tr:hover {
            background-color: #f8f9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-ongoing {
            background-color: #e7f5ff;
            color: var(--primary);
        }

        .status-completed {
            background-color: #e7f6ea;
            color: #0ca678;
        }

        .status-pending {
            background-color: #fff4e6;
            color: #f59f00;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: var(--success);
            color: white;
        }

        .btn-delete {
            background: var(--warning);
            color: white;
        }

        .btn-view {
            background: var(--primary);
            color: white;
        }

        .btn-sm:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }


        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }


        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-header h2,
            .menu-item span {
                display: none;
            }

            .main-content {
                margin-left: 70px;
            }

            .menu-item {
                justify-content: center;
            }

            .menu-item i {
                margin-right: 0;
            }

            .page-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>InternTrack</h2>
            <p>Management System</p>
        </div>
        <div class="sidebar-menu">
            <a href="/dashboard" class="menu-item">
                <i>📊</i>
                <span>Dashboard</span>
            </a>
            <a href="/students" class="menu-item">
                <i>👨‍🎓</i>
                <span>Students</span>
            </a>
            <a href="/mentors" class="menu-item">
                <i>👨‍🏫</i>
                <span>Mentors</span>
            </a>
            <a href="/internships" class="menu-item active">
                <i>💼</i>
                <span>Internships</span>
            </a>
            <a href="/evaluations" class="menu-item">
                <i>📝</i>
                <span>Evaluations</span>
            </a>
        </div>
    </div>


    <div class="main-content">
        <div class="header">
            <h1>Internship Management</h1>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div>
                    <div>User</div>
                    <div style="font-size: 0.8rem; color: var(--gray);">Coordinator</div>
                </div>
            </div>
        </div>

        <div class="page-actions">
            <a href="/internships/form" class="btn btn-primary">
                <i>➕</i>
                Add New Internship
            </a>
            <button class="btn btn-secondary" onclick="loadInternships()">
                <i>🔄</i>
                Refresh
            </button>
        </div>

        <div class="table-container">
            <table class="internship-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Title</th>
                        <th>Student</th>
                        <th>Mentor</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="internships-table-body">
                    <tr>
                        <td colspan="8" class="loading">
                            <div>Loading internships...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>

        async function loadInternships() {
            const tableBody = document.getElementById('internships-table-body');
            tableBody.innerHTML = '<tr><td colspan="8" class="loading"><div>Loading internships...</div></td></tr>';

            try {
                const response = await fetch('/api/internships');
                const internships = await response.json();

                displayInternships(internships);
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="8" class="loading"><div>Error loading internships. Please try again.</div></td></tr>';
                console.error('Error loading internships:', error);
            }
        }

        function displayInternships(internships) {
            const tableBody = document.getElementById('internships-table-body');

            if (!internships || internships.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div>💼</div>
                            <div>No internships found</div>
                            <div style="margin-top: 10px;">
                                <a href="/internships/form" class="btn btn-primary">Create First Internship</a>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = internships.map(internship => `
                <tr>
                    <td>${internship.companyName || ''}</td>
                    <td>${internship.title || ''}</td>
                    <td>${internship.student ? `${internship.student.name || ''}` : ''}</td>
                    <td>${internship.mentor ? `${internship.mentor.name || ''}` : ''}</td>
                    <td>${formatDate(internship.startDate)}</td>
                    <td>${formatDate(internship.endDate)}</td>
                    <td>
                        <span class="status-badge status-${(internship.status || '').toLowerCase()}">
                            ${internship.status || ''}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-sm btn-view" onclick="viewInternship(${internship.id})">
                                👁️ View
                            </button>
                            <button class="btn-sm btn-edit" onclick="editInternship(${internship.id})">
                                ✏️ Edit
                            </button>
                            <button class="btn-sm btn-delete" onclick="deleteInternship(${internship.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function viewInternship(id) {
            alert(`View internship with ID: ${id}`);
        }

        function editInternship(id) {
            window.location.href = `/internships/form?id=${id}`;
        }

        async function deleteInternship(id) {
            if (confirm('Are you sure you want to delete this internship?')) {
                try {
                    const response = await fetch(`/api/internships/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        alert('Internship deleted successfully!');
                        loadInternships();
                    } else {
                        alert('Error deleting internship');
                    }
                } catch (error) {
                    alert('Error deleting internship');
                    console.error('Error:', error);
                }
            }
        }


        document.addEventListener('DOMContentLoaded', function () {
            loadInternships();
        });
    </script>
</body>

</html>
