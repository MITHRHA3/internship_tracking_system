<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Form - Internship Tracking System</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --success: #4cc9f0;
            --warning: #f72585;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --sidebar-width: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fb;
            color: var(--dark);
            display: flex;
            min-height: 100vh;
        }


        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            color: white;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            transition: all 0.3s;
            box-shadow: 3px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .sidebar-menu {
            padding: 15px 0;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .menu-item.active {
            background-color: rgba(255, 255, 255, 0.2);
            border-left: 4px solid var(--success);
        }

        .menu-item i {
            margin-right: 10px;
            font-size: 1.2rem;
        }


        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
            transition: all 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: bold;
        }

        .form-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-title {
            margin-bottom: 25px;
            color: var(--dark);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ee;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--gray);
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gray);
            color: var(--gray);
        }

        .btn-outline:hover {
            background: var(--gray);
            color: white;
        }

        .message {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }


        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-header h2,
            .menu-item span {
                display: none;
            }

            .main-content {
                margin-left: 70px;
                padding: 15px;
            }

            .menu-item {
                justify-content: center;
            }

            .menu-item i {
                margin-right: 0;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>InternTrack</h2>
            <p>Management System</p>
        </div>
        <div class="sidebar-menu">
            <a href="/dashboard" class="menu-item">
                <i>📊</i>
                <span>Dashboard</span>
            </a>
            <a href="/students" class="menu-item">
                <i>👨‍🎓</i>
                <span>Students</span>
            </a>
            <a href="/mentors" class="menu-item">
                <i>👨‍🏫</i>
                <span>Mentors</span>
            </a>
            <a href="/internships" class="menu-item active">
                <i>💼</i>
                <span>Internships</span>
            </a>
            <a href="/evaluations" class="menu-item">
                <i>📝</i>
                <span>Evaluations</span>
            </a>
        </div>
    </div>


    <div class="main-content">
        <div class="header">
            <h1 id="page-title">Create Internship</h1>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <div>
                    <div>User</div>
                    <div style="font-size: 0.8rem; color: var(--gray);">Coordinator</div>
                </div>
            </div>
        </div>

        <div class="form-container">
            <div id="message" class="message"></div>

            <form id="internshipForm">
                <div class="form-group">
                    <label for="companyName">Company Name *</label>
                    <input type="text" id="companyName" name="companyName" required placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label for="title">Internship Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter internship title">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="studentId">Student *</label>
                        <select id="studentId" name="studentId" required>
                            <option value="">Select Student</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mentorId">Mentor *</label>
                        <select id="mentorId" name="mentorId" required>
                            <option value="">Select Mentor</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">Start Date *</label>
                        <input type="date" id="startDate" name="startDate" required>
                    </div>

                    <div class="form-group">
                        <label for="endDate">End Date *</label>
                        <input type="date" id="endDate" name="endDate" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="status">Status *</label>
                    <select id="status" name="status" required>
                        <option value="">Select Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Ongoing">Ongoing</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i>💾</i>
                        Create Internship
                    </button>
                    <a href="/internships" class="btn btn-outline">
                        <i>←</i>
                        Back to List
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>

        const urlParams = new URLSearchParams(window.location.search);
        const internshipId = urlParams.get('id');
        const isEditMode = !!internshipId;


        document.addEventListener('DOMContentLoaded', function () {
            if (isEditMode) {
                document.getElementById('page-title').textContent = 'Edit Internship';
                document.getElementById('submitBtn').innerHTML = '<i>💾</i> Update Internship';
                loadInternshipData();
            }

            loadStudents();
            loadMentors();


            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').min = today;
        });


        async function loadStudents() {
            try {
                const response = await fetch('/api/students');
                const students = await response.json();

                const studentSelect = document.getElementById('studentId');
                studentSelect.innerHTML = '<option value="">Select Student</option>';

                students.forEach(student => {
                    const option = document.createElement('option');
                    option.value = student.id;
                    option.textContent = `${student.name || ''}`;
                    studentSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }


        async function loadMentors() {
            try {
                const response = await fetch('/api/mentors');
                const mentors = await response.json();

                const mentorSelect = document.getElementById('mentorId');
                mentorSelect.innerHTML = '<option value="">Select Mentor</option>';

                mentors.forEach(mentor => {
                    const option = document.createElement('option');
                    option.value = mentor.id;
                    option.textContent = `${mentor.name || ''}`;
                    mentorSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading mentors:', error);
            }
        }

        async function loadInternshipData() {
            try {
                const response = await fetch(`/api/internships/${internshipId}`);
                const internship = await response.json();


                document.getElementById('companyName').value = internship.companyName || '';
                document.getElementById('title').value = internship.title || '';
                document.getElementById('studentId').value = internship.student?.id || '';
                document.getElementById('mentorId').value = internship.mentor?.id || '';
                document.getElementById('startDate').value = internship.startDate || '';
                document.getElementById('endDate').value = internship.endDate || '';
                document.getElementById('status').value = internship.status || '';
            } catch (error) {
                showMessage('Error loading internship data', 'error');
                console.error('Error:', error);
            }
        }


        document.getElementById('internshipForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = {
                companyName: document.getElementById('companyName').value,
                title: document.getElementById('title').value,
                student: { id: parseInt(document.getElementById('studentId').value) },
                mentor: { id: parseInt(document.getElementById('mentorId').value) },
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                status: document.getElementById('status').value
            };

            const submitBtn = document.getElementById('submitBtn');

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i>⏳</i> Saving...';

                let response;
                if (isEditMode) {

                    response = await fetch(`/api/internships/${internshipId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });
                } else {

                    response = await fetch('/api/internships', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });
                }

                if (response.ok) {
                    showMessage(
                        isEditMode ? 'Internship updated successfully!' : 'Internship created successfully!',
                        'success'
                    );

                    setTimeout(() => {
                        window.location.href = '/internships';
                    }, 1200);
                } else {
                    throw new Error('Failed to save internship');
                }
            } catch (error) {
                showMessage('Error saving internship. Please try again.', 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = isEditMode
                    ? '<i>💾</i> Update Internship'
                    : '<i>💾</i> Create Internship';
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }


        document.getElementById('startDate').addEventListener('change', function () {
            const endDate = document.getElementById('endDate');
            endDate.min = this.value;

            if (endDate.value && endDate.value < this.value) {
                endDate.value = this.value;
            }
        });
    </script>
</body>

</html>
