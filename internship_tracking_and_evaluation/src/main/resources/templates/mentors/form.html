<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .form-header {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .required-field::after {
            content: " *";
            color: #dc3545;
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: bold;
            margin: 0 auto 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h2 class="text-primary mb-2" id="formTitle">
                    <i class="bi bi-person-plus"></i> Add New Mentor
                </h2>
                <p class="text-muted mb-0">Enter mentor details below</p>
            </div>

            <form id="mentorForm" novalidate>
                <input type="hidden" id="mentorId">

                <div class="text-center mb-4">
                    <div class="avatar-preview" id="avatarPreview">
                        <span id="avatarInitials">?</span>
                    </div>
                    <small class="text-muted">Avatar preview</small>
                </div>

                <div class="mb-4">
                    <label for="name" class="form-label required-field">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter mentor's full name"
                        required minlength="2" maxlength="100">
                    <div class="invalid-feedback">
                        Please provide a valid name (2-100 characters).
                    </div>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <div class="mb-4">
                    <label for="email" class="form-label required-field">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email"
                        placeholder="Enter mentor's email address" required
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                    <div class="invalid-feedback">
                        Please provide a valid email address.
                    </div>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <div class="mb-4" id="mentorIdSection" style="display: none;">
                    <label class="form-label">Mentor ID</label>
                    <div class="form-control-plaintext">
                        <code id="displayMentorId"></code>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="button" class="btn btn-secondary me-md-2" id="cancelBtn">
                        <i class="bi bi-x-circle"></i> Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="bi bi-check-circle"></i> Save Mentor
                    </button>
                </div>

                <div class="text-center mt-3">
                    <div class="spinner-border text-primary d-none" role="status" id="loadingSpinner">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </form>

            <div class="alert alert-success d-none mt-3" id="successAlert">
                <i class="bi bi-check-circle-fill"></i>
                <span id="successMessage">Mentor saved successfully!</span>
            </div>
            <div class="alert alert-danger d-none mt-3" id="errorAlert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span id="errorMessage">An error occurred while saving the mentor.</span>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function () {
            const urlParams = new URLSearchParams(window.location.search);
            const mentorId = urlParams.get('id');

            if (mentorId) {
                loadMentorForEdit(mentorId);
            }

            $('#mentorForm').on('submit', function (e) {
                e.preventDefault();
                if (validateForm()) {
                    saveMentor();
                }
            });

            $('#cancelBtn').click(function () {
                if (confirm('Are you sure you want to cancel? Any unsaved changes will be lost.')) {
                    window.location.href = 'mentor.html';
                }
            });

            $('#name').on('input', function () {
                validateField($(this));
                updateAvatarPreview($(this).val());
            });

            $('#email').on('input', function () {
                validateField($(this));
            });

            function loadMentorForEdit(mentorId) {
                showLoading(true);

                $.ajax({
                    url: `/api/mentors/${mentorId}`,
                    type: 'GET',
                    success: function (mentor) {
                        $('#mentorId').val(mentor.id);
                        $('#name').val(mentor.name);
                        $('#email').val(mentor.email);

                        $('#displayMentorId').text(mentor.id);
                        $('#mentorIdSection').show();

                        updateAvatarPreview(mentor.name);

                        $('#formTitle').html('<i class="bi bi-person-check"></i> Edit Mentor');

                        validateField($('#name'));
                        validateField($('#email'));

                        showLoading(false);
                    },
                    error: function (xhr, status, error) {
                        console.error('Error loading mentor:', error);
                        showError('Failed to load mentor data. Please try again.');
                        showLoading(false);
                    }
                });
            }

            function saveMentor() {
                const mentorData = {
                    id: $('#mentorId').val() || null,
                    name: $('#name').val(),
                    email: $('#email').val()
                };

                const url = mentorData.id ? `/api/mentors/${mentorData.id}` : '/api/mentors';
                const method = mentorData.id ? 'PUT' : 'POST';

                showLoading(true);
                hideAlerts();

                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(mentorData),
                    success: function (response) {
                        showLoading(false);
                        showSuccess('Mentor saved successfully!');

                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1500);
                    },
                    error: function (xhr, status, error) {
                        console.error('Error saving mentor:', error);
                        showLoading(false);
                        showError('Failed to save mentor. Please try again.');
                    }
                });
            }

            function validateField(field) {
                const isValid = field[0].checkValidity();

                if (field.val().trim() === '') {
                    field.removeClass('is-valid is-invalid');
                    return false;
                }

                if (isValid) {
                    field.addClass('is-valid');
                    field.removeClass('is-invalid');
                } else {
                    field.addClass('is-invalid');
                    field.removeClass('is-valid');
                }

                return isValid;
            }

            function validateForm() {
                let isValid = true;

                $('#mentorForm input[required]').each(function () {
                    if (!validateField($(this))) {
                        isValid = false;
                    }
                });

                return isValid;
            }

            function updateAvatarPreview(name) {
                const initials = getInitials(name);
                $('#avatarInitials').text(initials);
            }

            function getInitials(name) {
                if (!name || name.trim() === '') return '?';
                return name.split(' ').map(word => word[0]).join('').toUpperCase();
            }

            function showLoading(show) {
                if (show) {
                    $('#loadingSpinner').removeClass('d-none');
                    $('#submitBtn').prop('disabled', true);
                    $('#cancelBtn').prop('disabled', true);
                } else {
                    $('#loadingSpinner').addClass('d-none');
                    $('#submitBtn').prop('disabled', false);
                    $('#cancelBtn').prop('disabled', false);
                }
            }

            function showSuccess(message) {
                $('#successMessage').text(message);
                $('#successAlert').removeClass('d-none');
                $('#errorAlert').addClass('d-none');
            }

            function showError(message) {
                $('#errorMessage').text(message);
                $('#errorAlert').removeClass('d-none');
                $('#successAlert').addClass('d-none');
            }

            function hideAlerts() {
                $('#successAlert').addClass('d-none');
                $('#errorAlert').addClass('d-none');
            }
        });
    </script>
</body>

</html>
