<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .form-header {
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .required-field::after {
            content: " *";
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            
            <div class="form-header">
                <h2 class="text-center mb-0" id="formTitle">Add New Student</h2>
                <p class="text-center text-muted mb-0">Fill in the student details below</p>
            </div>

            <form id="studentForm" novalidate>
               
                <input type="hidden" id="studentId">

                
                <div class="mb-3">
                    <label for="name" class="form-label required-field">Full Name</label>
                    <input type="text" 
                           class="form-control" 
                           id="name" 
                           name="name"
                           placeholder="Enter student's full name"
                           required
                           minlength="2"
                           maxlength="100">
                    <div class="invalid-feedback">
                        Please provide a valid name (2-100 characters).
                    </div>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <div class="mb-4">
                    <label for="email" class="form-label required-field">Email Address</label>
                    <input type="email" 
                           class="form-control" 
                           id="email" 
                           name="email"
                           placeholder="Enter student's email address"
                           required
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                    <div class="invalid-feedback">
                        Please provide a valid email address.
                    </div>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

               
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="button" class="btn btn-secondary me-md-2" id="cancelBtn">
                        <i class="bi bi-x-circle"></i> Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="bi bi-check-circle"></i> Save Student
                    </button>
                </div>

                <div class="text-center mt-3">
                    <div class="spinner-border text-primary d-none" role="status" id="loadingSpinner">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </form>

           
            <div class="alert alert-success d-none mt-3" id="successAlert">
                <i class="bi bi-check-circle-fill"></i>
                <span id="successMessage">Student saved successfully!</span>
            </div>
            <div class="alert alert-danger d-none mt-3" id="errorAlert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span id="errorMessage">An error occurred while saving the student.</span>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">

    <script>
        $(document).ready(function() {
            
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('id');

         
            if (studentId) {
                loadStudentForEdit(studentId);
            }

            $('#studentForm').on('submit', function(e) {
                e.preventDefault();
                if (validateForm()) {
                    saveStudent();
                }
            });

            $('#cancelBtn').click(function() {
                if (confirm('Are you sure you want to cancel? Any unsaved changes will be lost.')) {
                    window.location.href = 'student.html';
                }
            });

            
            $('#name, #email').on('input', function() {
                validateField($(this));
            });

           
            function loadStudentForEdit(studentId) {
                showLoading(true);
                
                $.ajax({
                    url: `/api/students/${studentId}`,
                    type: 'GET',
                    success: function(student) {
                        $('#studentId').val(student.id);
                        $('#name').val(student.name);
                        $('#email').val(student.email);
                        $('#formTitle').text('Edit Student');
                        showLoading(false);
                        
                        
                        validateField($('#name'));
                        validateField($('#email'));
                    },
                    error: function(xhr, status, error) {
                        console.error('Error loading student:', error);
                        showError('Error loading student data. Please try again.');
                        showLoading(false);
                    }
                });
            }

          
            function saveStudent() {
                const studentData = {
                    id: $('#studentId').val() || null,
                    name: $('#name').val(),
                    email: $('#email').val()
                };

                const url = studentData.id ? `/api/students/${studentData.id}` : '/api/students';
                const method = studentData.id ? 'PUT' : 'POST';

                showLoading(true);
                hideAlerts();

                $.ajax({
                    url: url,
                    type: method,
                    contentType: 'application/json',
                    data: JSON.stringify(studentData),
                    success: function(response) {
                        showLoading(false);
                        showSuccess('Student saved successfully!');
                        resetForm();
                        
                       
                        setTimeout(() => {
                            window.location.href = 'student.html';
                        }, 2000);
                    },
                    error: function(xhr, status, error) {
                        console.error('Error saving student:', error);
                        showLoading(false);
                        showError('Error saving student. Please try again.');
                    }
                });
            }

            function validateField(field) {
                const isValid = field[0].checkValidity();
                
                if (field.val().trim() === '') {
                    field.removeClass('is-valid is-invalid');
                    return false;
                }

                if (isValid) {
                    field.addClass('is-valid');
                    field.removeClass('is-invalid');
                } else {
                    field.addClass('is-invalid');
                    field.removeClass('is-valid');
                }

                return isValid;
            }

            
            function validateForm() {
                let isValid = true;
                
                $('#studentForm input[required]').each(function() {
                    if (!validateField($(this))) {
                        isValid = false;
                    }
                });

                return isValid;
            }

            
            function showLoading(show) {
                if (show) {
                    $('#loadingSpinner').removeClass('d-none');
                    $('#submitBtn').prop('disabled', true);
                    $('#cancelBtn').prop('disabled', true);
                } else {
                    $('#loadingSpinner').addClass('d-none');
                    $('#submitBtn').prop('disabled', false);
                    $('#cancelBtn').prop('disabled', false);
                }
            }

           
            function showSuccess(message) {
                $('#successMessage').text(message);
                $('#successAlert').removeClass('d-none');
                $('#errorAlert').addClass('d-none');
            }

       
            function showError(message) {
                $('#errorMessage').text(message);
                $('#errorAlert').removeClass('d-none');
                $('#successAlert').addClass('d-none');
            }

          
            function hideAlerts() {
                $('#successAlert').addClass('d-none');
                $('#errorAlert').addClass('d-none');
            }

          
            function resetForm() {
                $('#studentForm')[0].reset();
                $('#studentId').val('');
                $('#studentForm input').removeClass('is-valid is-invalid');
                hideAlerts();
            }

           
            window.addEventListener('beforeunload', function(e) {
                if ($('#name').val() || $('#email').val()) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });
        });
    </script>
</body>
</html>
